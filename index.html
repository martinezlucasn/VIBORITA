<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Viborita</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/icon-512.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="theme-color" content="#3B82F6" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <script src="https://connect.facebook.net/en_US/fbinstant.7.1.js"></script>
    <script>
      // 1. Iniciar el SDK
      if (typeof FBInstant !== 'undefined') {
        FBInstant.initializeAsync()
          .then(function() {
            console.log("SDK inicializado");
            
            // 2. Informar el progreso de carga
            FBInstant.setLoadingProgress(100); 

            // 3. Decirle a Facebook que arranque el juego
            return FBInstant.startGameAsync();
          })
          .then(function() {
            console.log("Juego iniciado");
            window.FB_GAME_READY = true;
            window.dispatchEvent(new Event('fb-instant-ready'));
          })
          .catch(function(error) {
            console.error("Error iniciando el SDK:", error);
            window.FB_GAME_READY = true;
            window.dispatchEvent(new Event('fb-instant-ready'));
          });
      } else {
        window.FB_GAME_READY = true;
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
